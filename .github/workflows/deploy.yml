name: Deploy naar rwwbouw.nl

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + git pull op Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configureer SSH
        run: |
          mkdir -p ~/.ssh
          # tr -d '\r' vangt het geval af dat de secret als CRLF is geplakt.
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Falen we hier, dan is de DEPLOY_SSH_KEY secret zelf corrupt — re-paste.
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY secret is geen geldige private key. Re-paste vanuit je password manager (let op: hele blok inclusief BEGIN/END regels en trailing newline)."
            exit 1
          fi

      - name: Deploy (fast-forward pull + PHP lint)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            DEPLOY_PATH="$DEPLOY_PATH" bash -s <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          echo "== Voor pull =="
          git rev-parse --short HEAD

          git fetch origin main

          # Fast-forward only — falt als lokaal bewerkte tracked files botsen met
          # inkomende wijzigingen. Dan moet iemand dat handmatig oplossen op de
          # server (meestal data/*.json dat via het CMS is bewerkt).
          if ! git merge --ff-only origin/main; then
            echo "::error::Fast-forward merge faalde. Waarschijnlijk is een lokaal bewerkt bestand ook in deze push gewijzigd. Los dit handmatig op via SSH."
            git status
            exit 1
          fi

          echo "== Na pull =="
          git rev-parse --short HEAD

          echo "== PHP syntax check =="
          # Lint alle PHP-bestanden die in deze push zijn aangeraakt (plus de
          # centrale routers) zodat we nooit een parse error live zetten.
          CHANGED=$(git diff --name-only HEAD@{1} HEAD -- '*.php' || true)
          for f in $CHANGED index.php form-handler.php router.php; do
            [ -f "$f" ] || continue
            php -l "$f" >/dev/null
          done
          echo "Alle PHP-bestanden syntactisch OK."
          REMOTE

      - name: Smoke test (HTTP 200 op homepage)
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" https://www.rwwbouw.nl/
